<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="./resources/ol.css">
        <link rel="stylesheet" href="resources/fontawesome-all.min.css">
        <link href="resources/photon-geocoder-autocomplete.min.css" rel="stylesheet">
        <link rel="stylesheet" href="./resources/ol-layerswitcher.css">
        <link rel="stylesheet" href="./resources/qgis2web.css">
        
        <style>
            /* Reset & Base Style */
            html, body {
                background-color: #1a3c34; /* Warna Hijau Tua sesuai foto */
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                color: #ffffff;
                overflow: hidden;
            }

            /* Container Utama */
            .dashboard-wrapper {
                display: flex;
                width: 100vw;
                height: 100vh;
                position: relative;
            }

            /* Panel Samping Kiri */
            .sidebar-left {
                width: 20%;
                padding: 60px 40px;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
                z-index: 10;
                background: linear-gradient(to right, rgba(26, 60, 52, 1), rgba(26, 60, 52, 0));
            }

            /* Area Peta (Tengah) */
            #map {
                width: 60%;
                height: 100%;
                background-color: transparent !important;
            }

            /* Panel Samping Kanan (Statistik) */
            .sidebar-right {
                width: 20%;
                padding: 60px 40px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                z-index: 10;
                background: linear-gradient(to left, rgba(26, 60, 52, 1), rgba(26, 60, 52, 0));
            }

            /* Tipografi */
            .title {
                font-size: 3.5rem;
                font-weight: 800;
                letter-spacing: 5px;
                margin: 0;
                text-transform: uppercase;
            }

            .subtitle {
                font-size: 0.9rem;
                line-height: 1.6;
                opacity: 0.7;
                margin-top: 20px;
                max-width: 300px;
            }

            .stat-box {
                margin-bottom: 40px;
            }

            .stat-value {
                font-size: 2.2rem;
                font-weight: bold;
                display: block;
                color: #e0f2f1;
            }

            .stat-label {
                font-size: 0.8rem;
                opacity: 0.6;
                letter-spacing: 1px;
                text-transform: uppercase;
            }

            /* Kustomisasi Kontrol Peta agar tidak putih mencolok */
            .ol-control > * {
                background-color: rgba(255, 255, 255, 0.1) !important;
                color: #ffffff !important;
                border: 0.5px solid rgba(255, 255, 255, 0.2) !important;
                border-radius: 4px;
            }

            .ol-attribution { display: none; } /* Opsional: sembunyikan credit agar bersih */

            /* Popup Style */
            .ol-popup {
                background-color: #1a3c34;
                color: white;
                border: 1px solid rgba(255,255,255,0.2);
                border-radius: 10px;
                padding: 15px;
            }
        </style>
        <title>SARIO UTARA DASHBOARD</title>
    </head>
    <body>
        <div class="dashboard-wrapper">
            
            <div class="sidebar-left">
                <h1 class="title">SARIO</h1>
                <h1 class="title" style="margin-top: -15px;">UTARA</h1>
                <p class="subtitle">
                    Peta tematik wilayah Sario Utara yang menampilkan distribusi data spasial secara real-time.
                </p>
                <div style="margin-top: auto; font-size: 0.8rem; letter-spacing: 2px;">
                    DETAILS >
                </div>
            </div>

            <div id="map">
                <div id="popup" class="ol-popup">
                    <a href="#" id="popup-closer" class="ol-popup-closer"></a>
                    <div id="popup-content"></div>
                </div>
            </div>

            <div class="sidebar-right">
                <div class="stat-box">
                    <span class="stat-value">23.2 M</span>
                    <span class="stat-label">Populasi Terdata</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value">3.28 M</span>
                    <span class="stat-label">Luas Wilayah (Ha)</span>
                </div>
                <div class="stat-box">
                    <span class="stat-value">0.72 M</span>
                    <span class="stat-label">Total Angkatan Kerja</span>
                </div>
            </div>

        </div>

        <script src="resources/qgis2web_expressions.js"></script>
        <script src="./resources/functions.js"></script>
        <script src="./resources/ol.js"></script>
        <script src="./resources/ol-layerswitcher.js"></script>
        <script src="resources/photon-geocoder-autocomplete.min.js"></script>
        <script src="layers/PETASARIOUTARA_1.js"></script>
        <script src="styles/PETASARIOUTARA_1_style.js"></script>
        <script src="./layers/layers.js" type="text/javascript"></script> 
        <script src="./resources/Autolinker.min.js"></script>
        <script src="./resources/qgis2web.js"></script>        
    </body>
</html>
